<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DASHX — live CAN dashboard</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#2563eb" />
    <meta
      name="description"
      content="DASHX — live CAN dashboard for BMW and other vehicles. Connect a SLCAN adapter over Web Serial or pair with a bimmerz-box dongle and watch frames decoded in real time."
    />
    <!-- Resolve the saved theme choice BEFORE the Svelte bundle
         paints so users on dark mode don't get a flash of light.
         App.svelte re-runs the same resolution as soon as it mounts
         and takes over from there (including live-tracking system
         theme changes). Settings key must match `STORAGE_KEY` in
         apps/web/src/lib/config.ts. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("dashx.web.config.v1");
          var parsed = raw ? JSON.parse(raw) : {};
          var choice = parsed.theme || "system";
          var dark =
            choice === "dark" ||
            (choice === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (_) {
          /* swallow — defaults to light, App.svelte will reconcile */
        }
      })();
    </script>
  </head>
  <body class="h-full bg-base font-mono text-foreground">
    <div id="app" class="h-full"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
